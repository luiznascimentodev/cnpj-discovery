services:
  postgres:
    ports: !reset []
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d

  redis:
    ports: !reset []
    restart: unless-stopped

  etl:
    restart: "no"
    volumes:
      - ./storage/cnpj_data:/tmp/cnpj_data

  api:
    ports: !reset []
    restart: unless-stopped
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      APP_BASE_URL: ${APP_BASE_URL}

  enrichment:
    ports: !reset []
    restart: unless-stopped

  # Worker contínuo de phase 1 (DNS + busca em searxng).
  # VPS tem 4 vCPU / 15 GB RAM — 10 réplicas com concurrency 10 cada cabem
  # com folga (~1.5 GB) e processam ~100 candidatos em paralelo no total,
  # sem competir agressivamente com a API.
  enrichment-worker:
    restart: unless-stopped
    environment:
      DISCOVERY_CONCURRENCY: "10"
    deploy:
      replicas: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_ACCOUNT_ID: production-account
        VITE_USER_ID: production-user
    container_name: cnpj-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    restart: unless-stopped
    ports: !override
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
