use_default_settings: true

general:
  debug: false
  instance_name: "cnpj-searxng"

search:
  safe_search: 0
  default_lang: "pt-BR"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "cnpj-discovery-searxng-key-long-enough"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
  default_locale: "pt"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
