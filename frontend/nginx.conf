map $sent_http_content_type $cnpj_disco_immutable_cache {
    default                              "no-cache";
    "~^application/javascript"          "public, max-age=31536000, immutable";
    "~^text/css"                         "public, max-age=31536000, immutable";
    "~^image/"                           "public, max-age=2592000, immutable";
    "~^font/"                            "public, max-age=2592000, immutable";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------- Security headers (applied to all responses) ----------------
    # Strict CSP. No inline scripts; tokens.css uses CSS variables so no style-src 'unsafe-inline' is needed
    # except for runtime-injected styles by some libs — guarded with 'unsafe-inline' on style-src only
    # because Radix injects inline styles for portals. Tighten further once that's confirmed unneeded.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Removes server version
    server_tokens off;

    # SPA: hashed assets get long cache + immutable; index.html must NOT cache.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        add_header Cache-Control $cnpj_disco_immutable_cache always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
