services:
  postgres:
    image: postgres:16-alpine
    container_name: cnpj-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cnpj}
      POSTGRES_USER: ${POSTGRES_USER:-cnpj_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    shm_size: 512mb
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=64MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=64MB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
      - -c
      - max_worker_processes=12
      - -c
      - max_parallel_workers_per_gather=6
      - -c
      - max_parallel_workers=12
      - -c
      - max_connections=300
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=10000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cnpj_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cnpj-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: cnpj-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cnpj-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_SERVICE_URL: http://enrichment:8010
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      PAID_CONTACT_FEATURE_KEY: ${PAID_CONTACT_FEATURE_KEY:-crawler_contacts}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      EMAIL_FROM: ${EMAIL_FROM:-CNPJ Discovery <noreply@localhost>}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: cnpj-etl
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - etl

  enrichment:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    container_name: cnpj-enrichment
    ports:
      - "8010:8010"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_HOST: 0.0.0.0
      ENRICHMENT_PORT: 8010
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      BRASILAPI_ENABLED: "${BRASILAPI_ENABLED:-true}"
      BRAVE_SEARCH_API_KEY: "${BRAVE_SEARCH_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: cnpj-searxng
    volumes:
      - ./config/searxng-config:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/search?q=test&format=json > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    profiles:
      - worker

  enrichment-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      BRASILAPI_ENABLED: "${BRASILAPI_ENABLED:-true}"
      BRAVE_SEARCH_API_KEY: "${BRAVE_SEARCH_API_KEY:-}"
      SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
      DISCOVERY_CONCURRENCY: "25"
    command:
      - python
      - cli.py
      - worker
      - --phase
      - "1"
      - --interval
      - "5"
      - --seed-batch-size
      - "${ENRICHMENT_SEED_BATCH:-5000}"
      - --discovery-batch-size
      - "${ENRICHMENT_DISCOVERY_BATCH:-500}"
      - --crawl-batch-size
      - "${ENRICHMENT_CRAWL_BATCH:-20}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
    deploy:
      replicas: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'cli.py worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - worker

  enrichment-worker-p2:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      BRASILAPI_ENABLED: "${BRASILAPI_ENABLED:-true}"
      SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
      DISCOVERY_CONCURRENCY: "10"
    command:
      - python
      - cli.py
      - worker
      - --phase
      - "2"
      - --interval
      - "30"
      - --seed-batch-size
      - "${ENRICHMENT_SEED_BATCH_P2:-10000}"
      - --discovery-batch-size
      - "${ENRICHMENT_DISCOVERY_BATCH_P2:-50}"
      - --crawl-batch-size
      - "${ENRICHMENT_CRAWL_BATCH:-20}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
    deploy:
      replicas: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'cli.py worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - worker-p2

  enrichment-demand-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      BRASILAPI_ENABLED: "${BRASILAPI_ENABLED:-true}"
      BRAVE_SEARCH_API_KEY: "${BRAVE_SEARCH_API_KEY:-}"
      SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
      DISCOVERY_CONCURRENCY: "${ENRICHMENT_DEMAND_CONCURRENCY:-2}"
    command:
      - python
      - cli.py
      - demand-worker
      - --batch-size
      - "${ENRICHMENT_DEMAND_BATCH:-20}"
      - --concurrency
      - "${ENRICHMENT_DEMAND_CONCURRENCY:-2}"
      - --interval
      - "${ENRICHMENT_DEMAND_INTERVAL:-5}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'demand-worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - demand-worker

  enrichment-trickle-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      BRASILAPI_ENABLED: "${BRASILAPI_ENABLED:-true}"
      SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
      DISCOVERY_CONCURRENCY: "${ENRICHMENT_TRICKLE_CONCURRENCY:-1}"
    command:
      - python
      - cli.py
      - trickle-worker
      - --seed-batch-size
      - "${ENRICHMENT_TRICKLE_SEED_BATCH:-25}"
      - --discovery-batch-size
      - "${ENRICHMENT_TRICKLE_BATCH:-5}"
      - --crawl-batch-size
      - "${ENRICHMENT_TRICKLE_BATCH:-5}"
      - --concurrency
      - "${ENRICHMENT_TRICKLE_CONCURRENCY:-1}"
      - --interval
      - "${ENRICHMENT_TRICKLE_INTERVAL:-120}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'trickle-worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - trickle-worker

  # Domain-first crawler worker (Phase 4+ of scale plan)
  # Scale independently: docker compose up -d --scale domain-crawler-worker=4
  domain-crawler-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      DOMAIN_FIRST_CRAWLER_ENABLED: "true"
    command:
      - python
      - cli.py
      - domain-crawler-tick
      - --batch-size
      - "${DOMAIN_CRAWLER_BATCH:-20}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
      - --interval
      - "${DOMAIN_CRAWLER_INTERVAL:-30}"
      - --enqueue-batch-size
      - "${DOMAIN_CRAWLER_ENQUEUE_BATCH:-25}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'domain-crawler-tick'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - domain-crawler

  # Resolver worker: maps domain candidates -> enriched_contacts
  domain-resolver-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
    command:
      - python
      - cli.py
      - resolve-domain-tick
      - --batch-size
      - "${DOMAIN_RESOLVER_BATCH:-1000}"
      - --interval
      - "${DOMAIN_RESOLVER_INTERVAL:-30}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'resolve-domain-tick'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - domain-crawler

  # Playwright browser fallback (Phase 6). Low global concurrency — never default path.
  # Build with: docker compose build playwright-crawler-worker
  # Scale: docker compose --profile playwright up -d (intentionally no --scale here)
  playwright-crawler-worker:
    build:
      context: ./enrichment
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT_BROWSERS: "true"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-development-enrichment-key}
      DOMAIN_FIRST_CRAWLER_ENABLED: "true"
    command:
      - python
      - cli.py
      - playwright-crawler-tick
      - --batch-size
      - "${PLAYWRIGHT_CRAWLER_BATCH:-5}"
      - --lease-seconds
      - "${ENRICHMENT_LEASE_SECONDS:-600}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'playwright-crawler-tick'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - playwright

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_ACCOUNT_ID: development-account
        VITE_USER_ID: development-user
    container_name: cnpj-frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: cnpj-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/v1/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:

networks:
  default:
    name: cnpj-network
